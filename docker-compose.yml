services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: diplom-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./results:/app/results:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: diplom-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  welcome:
    image: alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    command: >
      sh -c "
      echo '';
      echo '==================================================';
      echo '🚀 ДИПЛОМНЫЙ ПРОЕКТ УСПЕШНО ЗАПУЩЕН! 🚀';
      echo '==================================================';
      echo '🌐 Frontend (Сайт): http://localhost:5173';
      echo '⚙️  Backend (API): http://localhost:8000';
      echo '📚 Swagger (Документация API): http://localhost:8000/docs';
      echo '==================================================';
      echo '';
      "
